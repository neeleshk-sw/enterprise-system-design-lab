# Local end-to-end stack: PostgreSQL + customer-service.
# Usage: docker compose up --build   (or scripts/docker-up.sh)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: customer
      POSTGRES_USER: customer
      POSTGRES_PASSWORD: customer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer -d customer"]
      interval: 10s
      timeout: 5s
      retries: 5

  customer-service:
    build:
      context: .
      dockerfile: customer-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/customer
      DB_USERNAME: customer
      DB_PASSWORD: customer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
