# Configuration for the multi-module app. Base defaults target localhost; docker overrides
# live in application-docker.yml. Schema is owned by Flyway; Hibernate only validates.
spring:
  application:
    name: multi-module
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/multimodule}
    username: ${DB_USERNAME:multimodule}
    password: ${DB_PASSWORD:multimodule}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        type:
          preferred_instant_jdbc_type: TIMESTAMP
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    path: /swagger-ui.html
