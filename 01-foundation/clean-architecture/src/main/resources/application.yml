# Configuration for clean-architecture (Order domain).
# Base defaults target localhost; docker overrides live in application-docker.yml.
# Schema is owned by Flyway; Hibernate only validates (no auto-DDL).
spring:
  application:
    name: clean-architecture
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cleanarch}
    username: ${DB_USERNAME:cleanarch}
    password: ${DB_PASSWORD:cleanarch}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        type:
          preferred_instant_jdbc_type: TIMESTAMP
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    path: /swagger-ui.html
