# Local end-to-end stack: PostgreSQL + clean-architecture.
# Usage: docker compose up --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cleanarch
      POSTGRES_USER: cleanarch
      POSTGRES_PASSWORD: cleanarch
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleanarch -d cleanarch"]
      interval: 10s
      timeout: 5s
      retries: 5

  clean-architecture:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/cleanarch
      DB_USERNAME: cleanarch
      DB_PASSWORD: cleanarch
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
