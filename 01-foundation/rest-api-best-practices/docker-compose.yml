# Local end-to-end stack: PostgreSQL + rest-api-best-practices.
# Usage: docker compose up --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: restapi
      POSTGRES_USER: restapi
      POSTGRES_PASSWORD: restapi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restapi -d restapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  rest-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/restapi
      DB_USERNAME: restapi
      DB_PASSWORD: restapi
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
