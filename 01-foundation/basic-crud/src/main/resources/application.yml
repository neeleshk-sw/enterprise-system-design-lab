# basic-crud configuration. Base defaults target localhost; docker overrides in application-docker.yml.
# Schema is owned by Flyway; Hibernate only validates (no auto-DDL).
spring:
  application:
    name: basic-crud
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/basiccrud}
    username: ${DB_USERNAME:basiccrud}
    password: ${DB_PASSWORD:basiccrud}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        type:
          # Map Instant to plain TIMESTAMP (UTC-normalized) for deterministic validation.
          preferred_instant_jdbc_type: TIMESTAMP
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
