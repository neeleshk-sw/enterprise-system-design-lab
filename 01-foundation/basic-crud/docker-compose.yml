# Local end-to-end stack: PostgreSQL + basic-crud.
# Usage: docker compose up --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: basiccrud
      POSTGRES_USER: basiccrud
      POSTGRES_PASSWORD: basiccrud
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basiccrud -d basiccrud"]
      interval: 10s
      timeout: 5s
      retries: 5

  basic-crud:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/basiccrud
      DB_USERNAME: basiccrud
      DB_PASSWORD: basiccrud
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
