name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each independent Maven project. Add new sections here as they are built.
        project:
          - 00-template-service
          - 01-foundation/basic-crud
          - 01-foundation/layered-architecture
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # ubuntu-latest ships with a running Docker daemon, so Testcontainers
      # integration tests (PostgreSQL) run without extra setup.
      - name: Build & verify
        working-directory: ${{ matrix.project }}
        run: mvn -B -ntp clean verify
